# App
quarkus.banner.enabled=false
quarkus.application.name=openfactory-api
quarkus.http.port=8081

# CORS — allow frontend
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

# PostgreSQL — Supabase
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${SUPABASE_DB_USER}
quarkus.datasource.password=${SUPABASE_DB_PASSWORD}
quarkus.datasource.jdbc.url=${SUPABASE_DB_URL}

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# JWT — Supabase JWT secret
mp.jwt.verify.publickey.location=${SUPABASE_JWT_PUBLIC_KEY}
mp.jwt.verify.issuer=${SUPABASE_JWT_ISSUER}

# openfactory-core integration
openfactory.core.pipeline.mode=auto
