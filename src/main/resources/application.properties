# App
quarkus.banner.enabled=false
quarkus.application.name=openfactory-api
quarkus.http.port=8081
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern="%r %s %{RESPONSE_TIME}ms"

# CORS — handled by CorsFilter.java (JAX-RS ContainerResponseFilter)
cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# PostgreSQL — Supabase
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${SUPABASE_DB_USER:postgres}
quarkus.datasource.password=${SUPABASE_DB_PASSWORD}
quarkus.datasource.jdbc.url=${SUPABASE_DB_URL}

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# JWT — Supabase ECC P-256 (ES256) via JWKS
mp.jwt.verify.publickey.location=${SUPABASE_PROJECT_URL}/auth/v1/.well-known/jwks.json
mp.jwt.verify.issuer=${SUPABASE_JWT_ISSUER}
# Supabase sets aud: "authenticated" en todos los tokens
mp.jwt.verify.audiences=authenticated
# Refresca las keys del JWKS cada 60 minutos
smallrye.jwt.jwks.refresh-interval=60

# Pipeline
openfactory.core.pipeline.mode=auto

# Provider — core-lib reads ANTHROPIC_API_KEY from env (required in prod)
# Override model/limits per environment if needed
provider.model=${PROVIDER_MODEL:claude-haiku-4-5-20251001}
provider.max-tokens=${PROVIDER_MAX_TOKENS:2500}
provider.timeout-seconds=${PROVIDER_TIMEOUT_SECONDS:30}
provider.max-retries=${PROVIDER_MAX_RETRIES:3}
