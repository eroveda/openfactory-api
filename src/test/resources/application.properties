# Use a random available port so tests don't conflict with a running dev server
%test.quarkus.http.test-port=0

# In-memory H2 for tests — no real DB required
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=

# Skip Flyway migrations in tests
%test.quarkus.flyway.enabled=false

# Skip Hibernate schema validation in tests
%test.quarkus.hibernate-orm.database.generation=none

# Bypass JWT auth — DevUserService is mocked in HTTP tests
%test.openfactory.auth.bypass=true

# Disable proactive JWT auth so the mechanism doesn't init before ContainerRequestFilter
%test.quarkus.http.auth.proactive=false
%test.mp.jwt.verify.issuer=test-issuer
